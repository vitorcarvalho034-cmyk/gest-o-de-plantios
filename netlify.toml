[build]
  command = "pnpm run build:netlify"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA catch-all — todas as rotas vão para index.html
# (As Netlify Functions são roteadas automaticamente pelo Netlify)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
